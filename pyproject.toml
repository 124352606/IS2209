[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, B: flake8-bugbear
select = ["E", "W", "F", "I", "B"]
ignore = [
    "E501",   # line-length enforced separately
    "B008",   # do not perform function calls in default arguments (Flask patterns)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # module level import not at top of file (test fixtures)

[tool.coverage.run]
source = ["app"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
