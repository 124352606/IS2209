<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DeployHub{% endblock %}</title>
  <style>
    /* ---- Reset & base ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ---- Layout ---- */
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
    header nav a {
      color: #94a3b8;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    header nav a:hover { color: #38bdf8; }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #475569;
      font-size: 0.8rem;
      border-top: 1px solid #1e293b;
      margin-top: 4rem;
    }

    /* ---- Utilities ---- */
    .badge {
      display: inline-block;
      padding: 0.2em 0.6em;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-ok  { background: #166534; color: #bbf7d0; }
    .badge-err { background: #7f1d1d; color: #fecaca; }
    .badge-warn{ background: #78350f; color: #fde68a; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.1rem; color: #94a3b8; margin-bottom: 1rem; }

    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid #334155; }
    th { text-align: left; padding: 0.6rem 0.8rem; color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.75rem 0.8rem; border-bottom: 1px solid #1e293b; font-size: 0.95rem; }
    tbody tr:hover { background: #0f172a; }

    .positive { color: #4ade80; }
    .negative { color: #f87171; }
    .neutral  { color: #94a3b8; }

    .btn {
      display: inline-block;
      padding: 0.45rem 1rem;
      border-radius: 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-danger  { background: #dc2626; color: #fff; }

    input[type="text"] {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 0.4rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.9rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: #38bdf8; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .alert-warn { background: #451a03; color: #fde68a; border: 1px solid #78350f; }
    .alert-err  { background: #450a0a; color: #fecaca; border: 1px solid #7f1d1d; }

    .meta { color: #475569; font-size: 0.78rem; }
  </style>
</head>
<body>
  <header>
    <h1>&#9729; DeployHub</h1>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/status">Status</a>
      <a href="/health">Health API</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    DeployHub &mdash; IS2209 CI/CD University Project &mdash;
    Request ID: <code>{{ request_id }}</code>
  </footer>
</body>
</html>
