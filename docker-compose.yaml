# ---------------------------------------------------------------------------
# DeployHub — Docker Compose (local development + integration testing)
# ---------------------------------------------------------------------------
# Usage:
#   cp .env.example .env          # then edit .env with your values
#   docker compose up --build     # start both services
#   docker compose down -v        # stop and remove volumes
# ---------------------------------------------------------------------------

services:

  # --------------------------------------------------------------------------
  # PostgreSQL database service
  # --------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deployhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deployhub}
      POSTGRES_DB: ${POSTGRES_DB:-deployhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deployhub}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --------------------------------------------------------------------------
  # Application service
  # --------------------------------------------------------------------------
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "${PORT:-5000}:5000"
    restart: on-failure

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
