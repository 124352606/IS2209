# ---------------------------------------------------------------------------
# DeployHub — Continuous Integration Pipeline
# ---------------------------------------------------------------------------
# Runs on every push and pull_request to any branch.
# Jobs run sequentially: lint → test → build.
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # --------------------------------------------------------------------------
  # 1. Lint — ruff static analysis
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Run ruff
        run: ruff check .

  # --------------------------------------------------------------------------
  # 2. Test — pytest with coverage
  # --------------------------------------------------------------------------
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          COINGECKO_BASE_URL: https://api.coingecko.com/api/v3
          LOG_LEVEL: WARNING
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # --------------------------------------------------------------------------
  # 3. Build — Docker image smoke test (no push on PRs)
  # --------------------------------------------------------------------------
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t deployhub:${{ github.sha }} .

      - name: Confirm image runs (smoke test)
        run: |
          docker run --rm \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            -e COINGECKO_BASE_URL=https://api.coingecko.com/api/v3 \
            -e LOG_LEVEL=WARNING \
            deployhub:${{ github.sha }} \
            python -c "from app import create_app; app = create_app(); print('App factory OK')"
